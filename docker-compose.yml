services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: researchswarm
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: mysecret
      SALT: mysalt
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: researchswarm
      LANGFUSE_INIT_ORG_NAME: ResearchSwarm
      LANGFUSE_INIT_PROJECT_ID: researchswarm-dev
      LANGFUSE_INIT_PROJECT_NAME: ResearchSwarm Dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-1234567890
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-1234567890
      LANGFUSE_INIT_USER_EMAIL: admin@local.dev
      LANGFUSE_INIT_USER_NAME: Admin
      # NextAuth requires ≥8 characters; short passwords crash the server at boot.
      LANGFUSE_INIT_USER_PASSWORD: localdev12

volumes:
  mysqldata:
  langfuse_pgdata:
